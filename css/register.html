<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
    href="css/style.css">

</head>

<body>

    <section class="login-section d-flex align-items-center">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-5">

                    <div class="card shadow p-4">

                        <h2 class="text-center mb-4">
                            Register
                        </h2>

                        <form>

                            <div class="mb-3">

                                <label>
                                    Full Name
                                </label>

                                <input type="text"
                                class="form-control"
                                placeholder="Enter name">

                            </div>


                            <div class="mb-3">

                                <label>
                                    Email
                                </label>

                                <input type="email"
                                class="form-control"
                                placeholder="Enter email">

                            </div>


                            <div class="mb-3">

                                <label>
                                    Password
                                </label>

                                <input type="password"
                                class="form-control"
                                placeholder="Enter password">

                            </div>


                            <div class="mb-3">

                                <label>
                                    Confirm Password
                                </label>

                                <input type="password"
                                class="form-control"
                                placeholder="Confirm password">

                            </div>


                            <button class="btn btn-warning w-100">
                                Register
                            </button>

                            <p class="text-center mt-3">

                                Already have an account?

                                <a href="login.html">
                                    Login
                                </a>

                            </p>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
