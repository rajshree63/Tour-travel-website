<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Booking - Tour & Travels</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- Navbar Start -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                Tour & Travels

            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link"
                            href="index.html">

                            Home

                        </a>

                    </li>


                    <li class="nav-item">

                        <a class="nav-link"
                            href="about.html">

                            About

                        </a>

                    </li>


                    <li class="nav-item">

                        <a class="nav-link"
                            href="packages.html">

                            Packages

                        </a>

                    </li>


                    <li class="nav-item">

                        <a class="nav-link active"
                            href="booking.html">

                            Booking

                        </a>

                    </li>


                    <li class="nav-item">

                        <a class="nav-link"
                            href="contact.html">

                            Contact

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Navbar End -->


    <!-- Booking Section Start -->

    <section class="container py-5">

        <h1 class="text-center fw-bold mb-5">

            Book Your Tour

        </h1>

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow p-4">

                    <form action="/book" method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                class="form-control"
                                name="name"
                                placeholder="Enter your name">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                class="form-control"
                                name="email"
                                placeholder="Enter your email">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Select Package
                            </label>

                            <select class="form-select"
                                name="package">

                                <option>
                                    Goa Tour
                                </option>

                                <option>
                                    Manali Tour
                                </option>

                                <option>
                                    Kashmir Tour
                                </option>

                            </select>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Number of Travelers
                            </label>

                            <input type="number"
                                class="form-control"
                                name="travelers"
                                placeholder="Enter number">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Travel Date
                            </label>

                            <input type="date"
                                class="form-control"
                                name="date">

                        </div>


                        <button type="submit"
                            class="btn btn-warning">

                            Confirm Booking

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- Booking Section End -->


    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
